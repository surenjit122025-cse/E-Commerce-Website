<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="jpg" href="Project photo.jpg">
  <title>SurAsha Couture - Online Shopping</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<style>
  body {
    background-color: black;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  header {
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: #00ffee;
    box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
    font-family: 'Poppins', sans-serif;
  }

  .logo-title {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .logo-title img {
    font-size: larger;
    width: 90px;
    height: 90px;
    border-radius: 55px;
    border: 2px solid #ff00aa;
  }

  .logo-title h1 {
    font-weight: bolder;
    font-size: 45px;
    color: #ec1c9c;
  }

  nav ul {
    display: flex;
    list-style: none;
    gap: 32px;
  }

  nav a {
    text-decoration: none;
    color: black;
    font-weight: bolder;
    font-size: 19px;
    padding: 8px 16px;
    border-radius: 25px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;

  }

  nav a:hover {
    color: white;
    background: linear-gradient(45deg, #b3ff01, #ff00e6);
    box-shadow: 0 5px 15px rgb(0, 174, 255);
  }

  .container {
    color: white;
    margin: auto;
    font-style: italic;
    font-size: 20px;
    padding: 150px 2px;
    border-radius: 12px;
    text-align: center;
  }

  .gallery-footer {
    background-color: beige;
    color: white;
    padding: 20px 0 20px;
    position: relative;
  }

  .footer-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .footer-content {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    margin-bottom: 10px;
  }



  .footer-bottom {
    color: black;
    text-align: center;
  }

  .gallery-info h3,
  .social-media h4 {
    color: #e92121;
    margin-bottom: 20px;
  }

  .gallery-info p {
    color: #000000;
  }

  .contact-info {
    color: rgb(0, 0, 0);
    text-align: left;
  }

  .contact-info h4 {
    color: #e92121;
  }

  .social-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .social-link:hover {
    border: 2px solid rgb(4, 214, 246);
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgb(0, 255, 242);
  }

  .fa-twitter {
    color: #0097e6;
  }

  .fa-instagram {
    color: #e84393;
  }

  .fa-linkedin {
    color: #0097e6;
  }

  .fa-youtube {
    color: #e84188;
  }
</style>

<body>
  <header>
    <div class="logo-title">
      <img src="Project photo.jpg" alt="photo">
      <h1>SurAsha Couture</h1>
    </div>

    <nav class="active">
      <ul>
        <li><a href="Mens.html">Mens</a></li>
        <li><a href="Womens.html">Womens</a></li>
        <li><a href="Kids.html">Kids</a></li>
        <li><a href="About.html">About Us</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <p>Thank You for visiting...</p>
    </div>

    </div>
  </main>


  <footer class="gallery-footer">
    <div class="footer-container">
      <div class="footer-content">
        <div class="gallery-info">
          <h3>SurAsha Couture</h3>
          <p>SurAsha Couture is Collection of expensive items & best quality of products.</p>
        </div>
        <div class="social-media">
          <h4>Follow Us</h4>
          <div class="social-icons">
            <a href="https://x.com/" class="social-link" target="_blank"><i class="fa fa-twitter"></i></a>
            <a href="https://www.instagram.com/" class="social-link" target="_blank"><i class="fa fa-instagram"></i></a>
            <a href="https://www.facebook.com/" class="social-link" target="_blank"><i class="fa fa-facebook"></i></a>
            <a href="#" class="social-link" target="_blank"><i
                class="fa fa-linkedin"></i></a>
            <a href="#" class="social-link" target="_blank"><i class="fa fa-youtube"></i></a>
          </div>
        </div>
        <div class="contact-info">
          <h4>Visit Us</h4>
          <p>www.surashacouture.com</p>
          <p>Mob no.: 7895634528</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy;2026 SurAsha Couture | All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>

</html>
