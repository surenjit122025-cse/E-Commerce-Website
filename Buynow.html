<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="jpg" href="Project photo.jpg">
  <title>SurAsha Couture - Online Shopping</title>

</head>
<style>
  body {
    background-color: black;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100px;
    margin: 300px;
  }

  .Order-box {
    background: rgb(1, 255, 230);
    padding: 40px 60px;
    border-radius: 12px;
    box-shadow: 0px 10px 2000px rgb(29, 214, 195);
    text-align: center;
    transition: transform 0.3s ease;
  }

  .Order-box:hover {
    transform: scale(1.03);
    box-shadow: 0px 10px 2000px rgb(78, 255, 249);
    transition: transform 0.3s ease-in;
  }

  h1 {
    color: rgb(23, 66, 195);
  }

  p {
    font-size: 20px;
    color: #000000;
    margin-top: 10px;
  }

  a {
    margin-top: 20px;
    display: inline-block;
    background: #fc0ca8;
    padding: 10px 15px;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
  }

  a:hover {
    background: #d4007f;
  }
</style>

<body>
  <div class="Order-box">
    <h1>Your Order Placed Successfully...</h1>
    <p>Thank You for Shopping With SurAsha Couture🙏...</p>
    <a href="Mens.html">Back to Home</a>
  </div>


</body>

</html>
