<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="jpg" href="Project photo.jpg">
    <title>SurAsha Couture - Online Shopping</title>
</head>
<style>
    body {
        background-color: black;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100px;
        margin: 300px;
    }

    .box {
        background-color: rgb(255, 247, 0);
        padding: 40px 60px;
        border-radius: 12px;
        box-shadow: 0px 10px 3000px rgb(220, 206, 24);
        text-align: center;
        transition: transform 0.3s ease;
    }

    .box:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 2000px rgb(251, 255, 0);
        transition: transform 0.3s ease-in;
    }

    h1 {
        color: #2ba7d4;
        font-size: 32px;
        font-weight: bold;
    }

    p {
        font-size: 20px;
        color: #000000;
        margin-top: 10px;
    }

    a {
        margin-top: 20px;
        display: inline-block;
        background-color: #0a7ed1;
        padding: 10px 15px;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bolder;
    }

    a:hover {
        background: #0095ff;
    }
</style>

<body>
    <div class="box">
        <h1> Your Item added to cart🛒</h1>
        <p>Thank You for added to cart🙏...</p>
        <a href="Mens.html">Back to Home</a>
    </div>

</body>

</html>
